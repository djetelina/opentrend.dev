<div id="chart-release-cadence" class="chart-container"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('chart-release-cadence');
    var data = {{ release_count_series | safe }};
    var vals = data.map(function(d) { return d.value; });
    if (data.length < 2 || vals.every(function(v) { return v === vals[0]; })) {
        el.closest('.chart-panel').style.display = 'none'; return;
    }
    var chart = echarts.init(el);
    var f = "'IBM Plex Mono', monospace";
    chart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'axis',
            backgroundColor: '#1c1c24',
            borderColor: '#363642',
            padding: [8, 12],
            textStyle: { color: '#d4d4dc', fontFamily: f, fontSize: 11 }
        },
        grid: { left: 48, right: 16, top: 12, bottom: 24 },
        xAxis: {
            type: 'category',
            data: data.map(function(d) { return d.date; }),
            axisLine: { lineStyle: { color: '#363642' } },
            axisLabel: { color: '#9090a0', fontFamily: f, fontSize: 10 },
            axisTick: { show: false }
        },
        yAxis: {
            type: 'value',
            axisLine: { show: false },
            axisLabel: { color: '#9090a0', fontFamily: f, fontSize: 10 },
            splitLine: { lineStyle: { color: '#2a2a36' } }
        },
        series: [{
            type: 'line',
            data: data.map(function(d) { return d.value; }),
            step: 'end',
            showSymbol: false,
            lineStyle: { color: '#eab308', width: 1.5 },
            itemStyle: { color: '#eab308' }
        }]
    });
    window.addEventListener('resize', function() { chart.resize(); });
});
</script>
