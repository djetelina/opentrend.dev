<div id="chart-weekly-commits" class="chart-container"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('chart-weekly-commits');
    var data = {{ weekly_commits_series | safe }};
    if (data.length === 0 || data.every(function(d) { return d.value === 0; })) {
        el.closest('.chart-panel').style.display = 'none'; return;
    }
    var chart = echarts.init(el);
    var f = "'IBM Plex Mono', monospace";
    chart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'axis',
            backgroundColor: '#1c1c24',
            borderColor: '#363642',
            padding: [8, 12],
            textStyle: { color: '#d4d4dc', fontFamily: f, fontSize: 11 },
            axisPointer: { type: 'shadow' }
        },
        grid: { left: 48, right: 16, top: 12, bottom: 24 },
        xAxis: {
            type: 'category',
            data: data.map(function(d) { return d.date; }),
            axisLine: { lineStyle: { color: '#363642' } },
            axisLabel: { color: '#9090a0', fontFamily: f, fontSize: 10 },
            axisTick: { show: false }
        },
        yAxis: {
            type: 'value',
            axisLine: { show: false },
            axisLabel: { color: '#9090a0', fontFamily: f, fontSize: 10 },
            splitLine: { lineStyle: { color: '#2a2a36' } }
        },
        series: [{
            type: 'bar',
            data: data.map(function(d) { return d.value; }),
            barMaxWidth: 12,
            itemStyle: { color: '#06b6d4', borderRadius: [2, 2, 0, 0] }
        }]
    });
    window.addEventListener('resize', function() { chart.resize(); });
});
</script>
