services:
  opentrend:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    command: ["uv", "run", "litestar", "--app", "opentrend.app:create_app", "run", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: opentrend
      POSTGRES_PASSWORD: opentrend
      POSTGRES_DB: opentrend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentrend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
